<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xefag - แผ่นอมละลายเพื่อการนอนหลับ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* พื้นหลังสีแดงเข้มแบบไล่ระดับ */
            background: radial-gradient(circle at 50% 50%, #c81c45 0%, #8e0b24 100%);
        }
        
        /* ซ่อน scrollbar สำหรับเนื้อหาบางส่วนถ้ามี */
        ::-webkit-scrollbar {
            display: none;
        }

        /* รูปทรงใบไม้จางๆ เป็นพื้นหลัง */
        .bg-leaf {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 0 100px 0 100px;
            transform: rotate(45deg);
            z-index: 0;
        }
    </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden flex flex-col relative selection:bg-white selection:text-[#a0102b]">

    <!-- พื้นหลังตกแต่ง (ใบไม้จำลอง) -->
    <div class="bg-leaf w-64 h-64 top-20 left-[10%] rotate-[30deg]"></div>
    <div class="bg-leaf w-96 h-96 top-40 right-[15%] rotate-[-20deg]"></div>
    <div class="bg-leaf w-80 h-80 bottom-0 left-[30%] rotate-[60deg]"></div>

    <!-- ส่วนหัว (Header) -->
    <header class="relative z-10 px-8 py-6 flex items-center justify-between">
        <!-- โลโก้ -->
        <div class="flex items-center gap-2 cursor-pointer">
            <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a10 10 0 1 0 10 10" stroke-dasharray="4 4" stroke-linecap="round"/>
            </svg>
            <span class="text-2xl font-semibold tracking-wide">xefag</span>
        </div>

        <!-- เมนูนำทางตรงกลาง -->
        <nav class="hidden md:flex items-center gap-2 bg-[#8c0a23]/40 rounded-full p-1 backdrop-blur-sm border border-white/10">
            <a href="#" class="bg-white text-[#8c0a23] px-6 py-2 rounded-full text-sm font-medium transition-transform hover:scale-105 shadow-md">ผลิตภัณฑ์</a>
            <a href="#" class="text-white hover:text-white/80 px-6 py-2 rounded-full text-sm font-medium transition-colors">ติดต่อเรา</a>
        </nav>

        <!-- ไอคอนผู้ใช้และตะกร้า -->
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 rounded-full bg-black/20 flex items-center justify-center hover:bg-black/40 transition-colors backdrop-blur-sm">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
            <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center hover:bg-gray-100 transition-colors relative shadow-lg">
                <svg class="w-5 h-5 text-[#8c0a23]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="absolute -top-1 -right-1 bg-black text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">3</span>
            </button>
        </div>
    </header>

    <!-- เมนูย่อย (Sub-nav) -->
    <div class="relative z-10 px-8 py-2 flex items-center justify-between md:justify-start md:gap-32 text-sm text-white/80">
        <a href="#" class="flex items-center gap-1 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            กลับ
        </a>
        <div class="flex items-center gap-8 justify-center flex-grow md:flex-grow-0">
            <button class="flex items-center gap-2 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ผ่อนคลาย
            </button>
            <button class="flex items-center gap-2 text-white font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                การนอนหลับ
            </button>
        </div>
    </div>

    <!-- พื้นที่เนื้อหาหลัก -->
    <main class="relative z-10 flex-grow flex flex-col md:flex-row items-center justify-between px-8 md:px-16 py-8">
        
        <!-- คอลัมน์ซ้าย: รายละเอียดสินค้า -->
        <div class="w-full md:w-1/3 mb-10 md:mb-0">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold leading-tight mb-4">
                แผ่นอมละลาย<br>Sleep 30
            </h1>
            <p class="text-lg text-white/80 font-medium">250 มก.</p>
        </div>

        <!-- คอลัมน์กลาง: รูปภาพสินค้า (สร้างขวดด้วย CSS) -->
        <div class="w-full md:w-1/3 flex justify-center items-center relative">
            <div class="relative w-48 md:w-64 h-72 md:h-96 hover:-translate-y-2 transition-transform duration-500 cursor-pointer group">
                <!-- เงาขวด -->
                <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-3/4 h-12 bg-black/40 blur-xl rounded-[100%] group-hover:scale-90 transition-transform duration-500"></div>
                
                <!-- ฝาขวด -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[85%] h-16 md:h-20 bg-gradient-to-b from-white via-gray-100 to-gray-300 rounded-t-xl z-20 shadow-sm border-b border-gray-300">
                    <div class="w-full h-full opacity-30 bg-[repeating-linear-gradient(90deg,transparent,transparent_2px,#000_2px,#000_4px)]"></div>
                </div>
                
                <!-- ตัวขวด -->
                <div class="absolute top-16 md:top-20 left-1/2 -translate-x-1/2 w-full h-[13rem] md:h-[18rem] bg-gradient-to-br from-[#aa1232] to-[#590413] rounded-3xl z-10 overflow-hidden shadow-[inset_-15px_-15px_30px_rgba(0,0,0,0.5),inset_10px_10px_20px_rgba(255,255,255,0.2)] border border-white/10 backdrop-blur-sm">
                    
                    <!-- ฉลากสินค้า -->
                    <div class="absolute top-1/2 -translate-y-1/2 left-0 w-full h-3/5 bg-gradient-to-r from-[#b31435] via-[#ce1b43] to-[#b31435] flex flex-col items-center justify-center shadow-md border-y border-white/20">
                        <!-- โลโก้บนฉลาก -->
                        <svg class="w-8 h-8 text-white mb-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 3a9 9 0 1 0 9 9" stroke-dasharray="3 4" stroke-linecap="round"/>
                        </svg>
                        <h2 class="text-white text-2xl md:text-3xl font-semibold tracking-wide">Sleep</h2>
                        <p class="text-white/80 text-xs mt-1 font-medium">by Xefag</p>
                        
                        <div class="absolute bottom-3 left-4 text-xs font-semibold text-white/90">250 มก.</div>
                        <div class="absolute bottom-3 right-4 text-[10px] font-bold bg-white text-[#a0102b] rounded-full w-5 h-5 flex items-center justify-center shadow-sm">30</div>
                    </div>

                    <!-- จำลองเม็ดยาด้านล่างขวด -->
                    <div class="absolute bottom-2 left-6 w-14 h-8 rounded-full bg-[#3d030a] rotate-12 opacity-80 shadow-inner blur-[1px]"></div>
                    <div class="absolute bottom-4 right-8 w-16 h-9 rounded-full bg-[#4a040d] -rotate-[15deg] opacity-90 shadow-inner blur-[1px]"></div>
                    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-16 h-9 rounded-full bg-[#5c0612] rotate-[5deg] opacity-80 shadow-inner blur-[1px]"></div>
                </div>
            </div>
        </div>

        <!-- คอลัมน์ขวา: ตัวเลือกสินค้า -->
        <div class="w-full md:w-1/3 flex flex-col items-center md:items-end mt-10 md:mt-0">
            <!-- ขนาดบรรจุ (จำนวนแผ่น) -->
            <div class="flex items-center gap-3 mb-6 bg-black/10 p-1.5 rounded-full backdrop-blur-sm">
                <button onclick="selectSize(this)" class="size-btn w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold bg-white text-[#a0102b] shadow-lg transition-all">30</button>
                <button onclick="selectSize(this)" class="size-btn w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold text-white hover:bg-black/20 transition-all">60</button>
                <button onclick="selectSize(this)" class="size-btn w-12 h-12 rounded-full flex items-center justify-center text-sm font-bold text-white hover:bg-black/20 transition-all">90</button>
            </div>

            <!-- ข้อมูลเพิ่มเติม -->
            <a href="#" class="flex items-center gap-2 text-sm text-[#f6d365] hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                ข้อมูลทั่วไป ปริมาณ และผลข้างเคียง
            </a>
        </div>
    </main>

    <!-- ส่วนท้าย (Footer / แถบสั่งซื้อ) -->
    <footer class="relative z-10 w-full px-8 py-6 md:py-8 mt-auto flex flex-col md:flex-row items-center justify-between gap-6 border-t border-white/10 bg-black/5 backdrop-blur-md">
        
        <!-- ข้อความพาร์ทเนอร์ -->
        <div class="w-full md:w-1/2 text-xs md:text-sm text-[#ffc163] leading-relaxed">
            เราทำงานร่วมกับพันธมิตรของเราอย่างใกล้ชิด – รวมถึงระบบบริการสุขภาพแห่งชาติ (NHS), กองทัพ, ผู้ให้บริการด้านสุขภาพเอกชนรายใหญ่ และคลินิกแพทย์ทั่วไป
        </div>

        <!-- ส่วนราคาและสั่งซื้อ -->
        <div class="w-full md:w-1/2 flex items-center justify-between md:justify-end gap-6 md:gap-10">
            <!-- ราคา -->
            <div class="text-3xl md:text-4xl font-bold tracking-tight" id="totalPrice">
                $25.50
            </div>

            <!-- กล่องจำนวนและปุ่มซื้อ -->
            <div class="flex items-center gap-4 md:gap-6">
                <!-- ตัวปรับจำนวน -->
                <div class="flex items-center gap-4 text-lg">
                    <button onclick="updateQty(-1)" class="w-8 h-8 flex items-center justify-center rounded-full border border-white/30 hover:bg-white hover:text-[#a0102b] transition-colors pb-1.5">_</button>
                    <span id="qtyDisplay" class="font-medium w-4 text-center">1</span>
                    <button onclick="updateQty(1)" class="w-8 h-8 flex items-center justify-center rounded-full border border-white/30 hover:bg-white hover:text-[#a0102b] transition-colors">+</button>
                </div>

                <!-- ปุ่มซื้อเลย -->
                <button class="bg-white text-[#a0102b] px-6 md:px-8 py-3 md:py-3.5 rounded-2xl font-bold text-sm md:text-base shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    ซื้อเลย
                </button>
            </div>
        </div>
    </footer>

    <!-- โค้ด JavaScript สำหรับควบคุมการทำงานหน้าเว็บ -->
    <script>
        // ตัวแปรเก็บข้อมูล
        const basePrice = 25.50;
        let currentQty = 1;
        let sizeMultiplier = 1; // ไว้สำหรับคำนวณราคาเพิ่มเมื่อเลือกขนาดใหญ่ขึ้น

        const qtyDisplay = document.getElementById('qtyDisplay');
        const totalPriceDisplay = document.getElementById('totalPrice');
        const sizeBtns = document.querySelectorAll('.size-btn');

        // ฟังก์ชันอัปเดตราคาสุทธิ
        function updatePrice() {
            const total = basePrice * sizeMultiplier * currentQty;
            totalPriceDisplay.textContent = '$' + total.toFixed(2);
        }

        // ฟังก์ชันปรับจำนวน (+ / -)
        function updateQty(change) {
            const newQty = currentQty + change;
            if (newQty >= 1 && newQty <= 99) {
                currentQty = newQty;
                qtyDisplay.textContent = currentQty;
                updatePrice();
            }
        }

        // ฟังก์ชันเลือกขนาดบรรจุ
        function selectSize(btn) {
            // ล้างสถานะ active ของทุกปุ่ม
            sizeBtns.forEach(b => {
                b.classList.remove('bg-white', 'text-[#a0102b]', 'shadow-lg');
                b.classList.add('text-white', 'hover:bg-black/20');
            });

            // เพิ่มสถานะ active ให้ปุ่มที่คลิก
            btn.classList.remove('text-white', 'hover:bg-black/20');
            btn.classList.add('bg-white', 'text-[#a0102b]', 'shadow-lg');

            // คำนวณตัวคูณราคาใหม่ (สมมติว่าเพิ่มขนาด ราคาเพิ่มขึ้น)
            const size = parseInt(btn.textContent);
            if (size === 30) sizeMultiplier = 1;
            if (size === 60) sizeMultiplier = 1.9; // ลดราคานิดหน่อยเมื่อซื้อเยอะ
            if (size === 90) sizeMultiplier = 2.7;

            updatePrice();
        }
    </script>
</body>
</html>
